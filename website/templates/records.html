<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYRIX • Records Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <style>
        :root {
            --bg: #1a1208; --panel: #211a0e; --card: #2a2010; --card-alt: #241c0c;
            --amber: #e8a835; --amber-soft: #e8a83522; --amber-glow: #e8a83540;
            --terracotta: #c8613a; --terra-soft: #c8613a22;
            --sage: #7a9e6e; --sage-soft: #7a9e6e1a;
            --cream: #f0e6cc; --text: #ede4cf; --muted: #a09070;
            --border: rgba(232,168,53,0.12); --border-warm: rgba(232,168,53,0.25);
            --warn: #d4843a;
        }
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'DM Sans',sans-serif;display:flex;min-height:100vh;background:var(--bg);color:var(--text);background-image:radial-gradient(ellipse 80% 60% at 10% 0%,#2e1f0820 0%,transparent 60%),radial-gradient(ellipse 60% 80% at 90% 100%,#1a100620 0%,transparent 60%);}

        /* SIDEBAR */
        aside{width:240px;min-height:100vh;background:var(--panel);border-right:1px solid var(--border);padding:28px 20px;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;}
        .logo{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;letter-spacing:4px;color:var(--amber);text-align:center;margin-bottom:8px;}
        .logo-sub{font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);text-align:center;margin-bottom:36px;}
        .nav-section-label{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);padding:0 12px;margin:16px 0 8px;}
        nav ul{list-style:none;}
        nav li{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:10px;margin-bottom:3px;cursor:pointer;color:var(--muted);font-size:14px;transition:all 0.2s;border:1px solid transparent;}
        nav li:hover{background:var(--amber-soft);color:var(--amber);}
        nav li.active{background:linear-gradient(135deg,var(--amber-soft),var(--terra-soft));color:var(--cream);border-color:var(--border-warm);}
        nav li.active .nav-icon{color:var(--amber);}
        .nav-icon{font-size:15px;width:18px;text-align:center;}
        .sidebar-footer{margin-top:auto;padding-top:20px;border-top:1px solid var(--border);}
        .user-block{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;background:var(--card);border:1px solid var(--border);margin-bottom:10px;}
        .avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--amber),var(--terracotta));display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:700;font-size:13px;color:#1a0e00;flex-shrink:0;}
        .user-info p{font-size:13px;font-weight:500;color:var(--cream);}
        .user-info span{font-size:11px;color:var(--muted);}
        .logout-btn{width:100%;padding:10px;background:none;border:1px solid rgba(200,97,58,0.3);border-radius:8px;color:var(--terracotta);font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.2s;}
        .logout-btn:hover{background:var(--terra-soft);}

        /* MAIN */
        main{flex:1;display:flex;flex-direction:column;overflow-x:hidden;}
        header{padding:18px 32px;display:flex;justify-content:space-between;align-items:center;background:rgba(33,26,14,0.7);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10;}
        .header-left h1{font-family:'Syne',sans-serif;font-size:17px;font-weight:600;color:var(--cream);}
        .header-left p{font-size:12px;color:var(--muted);margin-top:2px;}
        .header-right{display:flex;align-items:center;gap:12px;}
        .badge{display:flex;align-items:center;gap:7px;background:var(--sage-soft);color:var(--sage);padding:6px 14px;border-radius:999px;font-size:12px;font-weight:500;border:1px solid rgba(122,158,110,0.25);}
        .pulse-dot{width:8px;height:8px;border-radius:50%;background:var(--sage);box-shadow:0 0 0 3px var(--sage-soft);animation:pulse 2s infinite;flex-shrink:0;}
        @keyframes pulse{0%,100%{box-shadow:0 0 0 3px var(--sage-soft);}50%{box-shadow:0 0 0 6px transparent;}}
        .date-badge{font-size:12px;color:var(--muted);padding:6px 14px;border-radius:999px;border:1px solid var(--border);}

        .content{padding:28px 32px;flex:1;}

        /* STAT STRIP */
        .stat-strip{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:24px;}
        .stat-tile{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;transition:border-color 0.2s;}
        .stat-tile:hover{border-color:var(--border-warm);}
        .st-label{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
        .st-val{font-family:'Syne',sans-serif;font-size:24px;font-weight:700;color:var(--cream);}
        .st-sub{font-size:11px;color:var(--muted);margin-top:4px;}
        .st-val.low{color:var(--sage);}
        .st-val.medium{color:var(--warn);}
        .st-val.high{color:var(--terracotta);}

        /* CHARTS GRID */
        .charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px;}
        .chart-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:22px;transition:border-color 0.2s;}
        .chart-card:hover{border-color:var(--border-warm);}
        .chart-card.wide{grid-column:1/-1;}
        .chart-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
        .chart-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:600;color:var(--cream);}
        .chart-subtitle{font-size:11px;color:var(--muted);margin-top:2px;}
        .chart-badge{font-size:10px;padding:4px 10px;border-radius:999px;border:1px solid var(--border-warm);color:var(--amber);background:var(--amber-soft);}
        .chart-wrap{position:relative;height:180px;}
        .chart-wrap.tall{height:220px;}

        /* RECORDS TABLE */
        .table-card{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;}
        .table-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
        .table-header h3{font-family:'Syne',sans-serif;font-size:14px;font-weight:600;color:var(--cream);}
        .table-header span{font-size:11px;color:var(--muted);}
        table{width:100%;border-collapse:collapse;}
        thead tr{background:rgba(255,255,255,0.02);}
        th{padding:12px 20px;text-align:left;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);font-weight:500;}
        td{padding:13px 20px;font-size:13px;color:var(--text);border-bottom:1px solid var(--border);}
        tr:last-child td{border-bottom:none;}
        tr:hover td{background:rgba(232,168,53,0.03);}
        .risk-chip{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:500;}
        .risk-chip.low{background:var(--sage-soft);color:var(--sage);border:1px solid rgba(122,158,110,0.2);}
        .risk-chip.medium{background:rgba(212,132,58,0.12);color:var(--warn);border:1px solid rgba(212,132,58,0.2);}
        .risk-chip.high{background:var(--terra-soft);color:var(--terracotta);border:1px solid rgba(200,97,58,0.2);}
        .chip-dot{width:5px;height:5px;border-radius:50%;background:currentColor;}

        /* EMPTY */
        .empty-state{text-align:center;padding:60px 20px;color:var(--muted);}
        .empty-state .es-icon{font-size:36px;margin-bottom:14px;}
        .empty-state p{font-size:14px;margin-bottom:20px;}
        .go-predict{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;background:linear-gradient(135deg,var(--amber-soft),var(--terra-soft));border:1px solid var(--border-warm);border-radius:10px;color:var(--amber);font-size:13px;font-weight:500;text-decoration:none;transition:all 0.2s;}
        .go-predict:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(232,168,53,0.15);}

        /* LOADING */
        .loading{text-align:center;padding:40px;color:var(--muted);font-size:13px;}

        /* EXPORT */
        .export-btn{padding:8px 16px;background:none;border:1px solid var(--border);border-radius:8px;color:var(--muted);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.2s;}
        .export-btn:hover{background:var(--amber-soft);color:var(--amber);border-color:var(--border-warm);}

        @media(max-width:1100px){.stat-strip{grid-template-columns:repeat(3,1fr);}.charts-grid{grid-template-columns:1fr;}.chart-card.wide{grid-column:1;}}
        @media(max-width:700px){.stat-strip{grid-template-columns:1fr 1fr;}}
        @media(max-width:600px){aside{display:none;}.content{padding:20px 16px;}}
    </style>
</head>
<body>
    <aside>
        <div class="logo">CYRIX</div>
        <div class="logo-sub">Health Intelligence</div>
        <div class="nav-section-label">Main</div>
        <nav><ul>
            <li onclick="go('/dashboard')"><span class="nav-icon">⬡</span> Dashboard</li>
            <li onclick="go('/profile')"><span class="nav-icon">◎</span> Profile</li>
            <li onclick="go('/plans')"><span class="nav-icon">▦</span> Plans</li>
            <li class="active" onclick="go('/records')"><span class="nav-icon">◈</span> Records</li>
        </ul></nav>
        <div class="nav-section-label">Tools</div>
        <nav><ul>
            <li onclick="go('/session')"><span class="nav-icon">◇</span> Assessment</li>
            <li onclick="go('/rules')"><span class="nav-icon">◉</span> Insights</li>
            <li onclick="go('/nutrition')"><span class="nav-icon">◐</span> Nutrition</li>
        </ul></nav>
        <div class="sidebar-footer">
            <div class="user-block">
                <div class="avatar">U</div>
                <div class="user-info"><p>User</p><span>Member</span></div>
            </div>
            <button class="logout-btn" onclick="go('/logout')">Sign out</button>
        </div>
    </aside>

    <main>
        <header>
            <div class="header-left">
                <h1>Records Dashboard</h1>
                <p>Prediction history · Metrics over time</p>
            </div>
            <div class="header-right">
                <button class="export-btn" onclick="exportJSON()">↓ Export JSON</button>
                <span class="date-badge" id="lastUpdated">Loading…</span>
                <div class="badge"><span class="pulse-dot"></span> Live Data</div>
            </div>
        </header>

        <div class="content">
            <div id="mainContent">
                <div class="loading">◌ Loading records…</div>
            </div>
        </div>
    </main>

    <script>
        let allRecords = [];

        function go(path) { window.location.href = path; }

        function riskClass(r) {
            const v = (r || "").toLowerCase();
            if (v.includes("low")) return "low";
            if (v.includes("high")) return "high";
            return "medium";
        }

        function fmt(ts) {
            if (!ts) return "—";
            const d = new Date(ts);
            return d.toLocaleDateString("en-IN", {day:"2-digit",month:"short",year:"numeric"}) +
                   " " + d.toLocaleTimeString("en-IN", {hour:"2-digit",minute:"2-digit"});
        }

        function avg(arr, key) {
            const vals = arr.map(e => e[key]).filter(v => v > 0);
            if (!vals.length) return 0;
            return (vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1);
        }

        function lastRisk(entries) {
            return entries.length ? entries[0].risk : "—";
        }

        function buildPage(entries) {
            if (!entries.length) {
                document.getElementById("mainContent").innerHTML = `
                    <div class="empty-state">
                        <div class="es-icon">◈</div>
                        <p>No predictions yet. Run your first health assessment to see your records here.</p>
                        <a href="/session" class="go-predict">◎ &nbsp;Go to Predictor →</a>
                    </div>`;
                return;
            }

            const riskCounts = {low:0, medium:0, high:0};
            entries.forEach(e => riskCounts[riskClass(e.risk)]++);
            const latestRisk = lastRisk(entries);
            const latestRC   = riskClass(latestRisk);

            // Labels (reversed = oldest→newest for charts)
            const rev = [...entries].reverse();
            const labels = rev.map((e,i) => {
                const d = new Date(e.timestamp);
                return isNaN(d) ? `#${i+1}` : d.toLocaleDateString("en-IN",{day:"2-digit",month:"short"});
            });

            document.getElementById("mainContent").innerHTML = `
                <!-- STAT STRIP -->
                <div class="stat-strip">
                    <div class="stat-tile">
                        <div class="st-label">Total Predictions</div>
                        <div class="st-val">${entries.length}</div>
                        <div class="st-sub">All time</div>
                    </div>
                    <div class="stat-tile">
                        <div class="st-label">Latest Risk</div>
                        <div class="st-val ${latestRC}">${latestRisk}</div>
                        <div class="st-sub">Most recent</div>
                    </div>
                    <div class="stat-tile">
                        <div class="st-label">Avg Steps</div>
                        <div class="st-val">${avg(entries,'steps')}</div>
                        <div class="st-sub">per day</div>
                    </div>
                    <div class="stat-tile">
                        <div class="st-label">Avg Sleep</div>
                        <div class="st-val">${avg(entries,'sleep')}h</div>
                        <div class="st-sub">per night</div>
                    </div>
                    <div class="stat-tile">
                        <div class="st-label">Avg BP</div>
                        <div class="st-val">${avg(entries,'systolic_bp')}</div>
                        <div class="st-sub">mmHg systolic</div>
                    </div>
                </div>

                <!-- CHARTS -->
                <div class="charts-grid">
                    <div class="chart-card">
                        <div class="chart-header">
                            <div>
                                <div class="chart-title">Daily Steps</div>
                                <div class="chart-subtitle">Physical activity over time</div>
                            </div>
                            <span class="chart-badge">Steps</span>
                        </div>
                        <div class="chart-wrap"><canvas id="stepsChart"></canvas></div>
                    </div>
                    <div class="chart-card">
                        <div class="chart-header">
                            <div>
                                <div class="chart-title">Sleep Duration</div>
                                <div class="chart-subtitle">Hours per night</div>
                            </div>
                            <span class="chart-badge">Sleep</span>
                        </div>
                        <div class="chart-wrap"><canvas id="sleepChart"></canvas></div>
                    </div>
                    <div class="chart-card">
                        <div class="chart-header">
                            <div>
                                <div class="chart-title">Blood Pressure (Systolic)</div>
                                <div class="chart-subtitle">mmHg over time</div>
                            </div>
                            <span class="chart-badge">BP</span>
                        </div>
                        <div class="chart-wrap"><canvas id="bpChart"></canvas></div>
                    </div>
                    <div class="chart-card">
                        <div class="chart-header">
                            <div>
                                <div class="chart-title">Cholesterol</div>
                                <div class="chart-subtitle">mg/dL over time</div>
                            </div>
                            <span class="chart-badge">Chol</span>
                        </div>
                        <div class="chart-wrap"><canvas id="cholChart"></canvas></div>
                    </div>
                    <div class="chart-card wide">
                        <div class="chart-header">
                            <div>
                                <div class="chart-title">Risk Score Trend</div>
                                <div class="chart-subtitle">Composite cardiovascular score per assessment</div>
                            </div>
                            <span class="chart-badge">Risk Score</span>
                        </div>
                        <div class="chart-wrap tall"><canvas id="scoreChart"></canvas></div>
                    </div>
                </div>

                <!-- TABLE -->
                <div class="table-card">
                    <div class="table-header">
                        <h3>All Predictions</h3>
                        <span>${entries.length} record${entries.length!==1?'s':''} · newest first</span>
                    </div>
                    <div style="overflow-x:auto">
                    <table>
                        <thead><tr>
                            <th>Date</th><th>Risk</th><th>Score</th><th>Age</th>
                            <th>BP (mmHg)</th><th>Chol (mg/dL)</th><th>Steps</th><th>Sleep (h)</th><th>Reason</th>
                        </tr></thead>
                        <tbody id="recordsBody"></tbody>
                    </table>
                    </div>
                </div>`;

            // Table rows
            const tbody = document.getElementById("recordsBody");
            entries.forEach(e => {
                const rc = riskClass(e.risk);
                tbody.innerHTML += `<tr>
                    <td style="white-space:nowrap;color:var(--muted);font-size:12px">${fmt(e.timestamp)}</td>
                    <td><span class="risk-chip ${rc}"><span class="chip-dot"></span>${e.risk}</span></td>
                    <td style="font-family:'Syne',sans-serif;font-weight:600">${e.score}</td>
                    <td>${e.age || '—'}</td>
                    <td>${e.systolic_bp || '—'}</td>
                    <td>${e.chol || '—'}</td>
                    <td>${e.steps ? e.steps.toLocaleString() : '—'}</td>
                    <td>${e.sleep || '—'}</td>
                    <td style="font-size:12px;color:var(--muted);max-width:260px">${(e.reason||'').split(';').slice(0,3).join('; ')}</td>
                </tr>`;
            });

            // ── Charts ──────────────────────────────────────────────────────

            const chartDefaults = {
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { display: false }, tooltip: {
                    backgroundColor: "#2a2010", titleColor: "#f0e6cc", bodyColor: "#a09070",
                    borderColor: "rgba(232,168,53,0.25)", borderWidth: 1, padding: 10,
                    cornerRadius: 8
                }},
                scales: {
                    x: { grid: { color: "rgba(232,168,53,0.06)", drawBorder: false },
                         ticks: { color: "#a09070", font: { size: 10 }, maxRotation: 0 }},
                    y: { grid: { color: "rgba(232,168,53,0.06)", drawBorder: false },
                         ticks: { color: "#a09070", font: { size: 10 }}}
                }
            };

            const makeLineChart = (id, data, color, fill=true) => {
                new Chart(document.getElementById(id), {
                    type: "line",
                    data: {
                        labels,
                        datasets: [{
                            data,
                            borderColor: color,
                            backgroundColor: fill ? color.replace(")",",0.08)").replace("rgb","rgba") : "transparent",
                            borderWidth: 2,
                            pointBackgroundColor: color,
                            pointRadius: data.length <= 15 ? 4 : 2,
                            pointHoverRadius: 6,
                            tension: 0.4,
                            fill: fill
                        }]
                    },
                    options: JSON.parse(JSON.stringify(chartDefaults))
                });
            };

            makeLineChart("stepsChart", rev.map(e=>e.steps||0),  "rgb(122,158,110)");
            makeLineChart("sleepChart", rev.map(e=>e.sleep||0),   "rgb(232,168,53)");
            makeLineChart("bpChart",    rev.map(e=>e.systolic_bp||0), "rgb(212,132,58)");
            makeLineChart("cholChart",  rev.map(e=>e.chol||0),    "rgb(200,97,58)");

            // Score chart — bar
            const scoreOpts = JSON.parse(JSON.stringify(chartDefaults));
            scoreOpts.plugins.tooltip.callbacks = {
                label: ctx => ` Score: ${ctx.parsed.y}  ·  ${rev[ctx.dataIndex]?.risk || ''}`
            };
            new Chart(document.getElementById("scoreChart"), {
                type: "bar",
                data: {
                    labels,
                    datasets: [{
                        data: rev.map(e=>e.score||0),
                        backgroundColor: rev.map(e => {
                            const rc = riskClass(e.risk);
                            return rc==="low" ? "rgba(122,158,110,0.5)" :
                                   rc==="high" ? "rgba(200,97,58,0.5)" : "rgba(212,132,58,0.5)";
                        }),
                        borderColor: rev.map(e => {
                            const rc = riskClass(e.risk);
                            return rc==="low" ? "rgb(122,158,110)" :
                                   rc==="high" ? "rgb(200,97,58)" : "rgb(212,132,58)";
                        }),
                        borderWidth: 1,
                        borderRadius: 6
                    }]
                },
                options: scoreOpts
            });
        }

        async function loadData() {
            try {
                const res  = await fetch("/api/records/summary");
                const data = await res.json();
                allRecords = data.entries || [];

                // Update last updated badge
                if (allRecords.length) {
                    const d = new Date(allRecords[0].timestamp);
                    document.getElementById("lastUpdated").textContent =
                        isNaN(d) ? "—" : d.toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"numeric"});
                } else {
                    document.getElementById("lastUpdated").textContent = "No data";
                }

                buildPage(allRecords);
            } catch (err) {
                document.getElementById("mainContent").innerHTML =
                    `<div class="empty-state"><div class="es-icon">⚠</div><p>Failed to load records. Is the server running?</p></div>`;
            }
        }

        function exportJSON() {
            const blob = new Blob([JSON.stringify(allRecords, null, 2)], {type:"application/json"});
            const url  = URL.createObjectURL(blob);
            const a    = document.createElement("a");
            a.href = url; a.download = "cyrix_records.json"; a.click();
            URL.revokeObjectURL(url);
        }

        loadData();
    </script>
</body>
</html>
